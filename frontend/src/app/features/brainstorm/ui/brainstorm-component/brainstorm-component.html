<div #brainstormboard class="brainstorm-board">
  <p-contextMenu [target]="brainstormboard" [model]="boardMenuItems"/>

  <div class="board-header">
    <div class="board-title">
      <span class="board-icon">🧠</span>
      <span>Brainstorm</span>
    </div>
    <div class="board-subtitle">Drag ideas freely on the board</div>
  </div>

  @for (bi of brainstormIdea; track bi.id) {
    <p-card
      [header]="bi.title"
      cdkDrag
      [cdkDragFreeDragPosition]="bi.position"
      (cdkDragEnded)="onDragEnd($event, bi)"
      cdkDragBoundary=".brainstorm-board"
      class="brainstorm-card"
      [style]="{ backgroundColor: bi.color }"
      (contextmenu)="onIdeaRightClick($event, bi)"
    >
      <p class="m-0">{{ bi.description }}</p>
    </p-card>
  }

  <p-contextMenu
    #ideaMenu
    [model]="ideaMenuItems"
  ></p-contextMenu>

</div>
