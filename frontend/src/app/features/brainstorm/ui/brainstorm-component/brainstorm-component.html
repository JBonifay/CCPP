<div #brainstormboard class="brainstorm-board">
  <p-contextMenu [target]="brainstormboard" [model]="boardMenuItems"/>

  <div class="board-header">
    <div class="board-title">
      <span class="board-icon">🧠</span>
      <span>Brainstorm</span>
    </div>
    <div class="board-subtitle">Drag ideas freely on the board</div>
  </div>

  @for (bi of brainstormIdea(); track bi.id) {
    <p-card
      [header]="bi.title"
      cdkDrag
      [cdkDragFreeDragPosition]="bi.position"
      (cdkDragEnded)="onDragEnd($event, bi)"
      cdkDragBoundary=".brainstorm-board"
      class="brainstorm-card"
      [class.visitor-blur]="visitorMode.isActive()"
      [style]="{ backgroundColor: bi.color }"
      (contextmenu)="onIdeaRightClick($event, bi)"
      (dblclick)="editIdea(bi)"
    >
      <p class="m-0">{{ bi.description }}</p>
    </p-card>
  }

  <p-contextMenu
    #ideaMenu
    [model]="ideaMenuItems"
  ></p-contextMenu>

</div>

<p-dialog
  [header]="isCreating ? 'New Idea' : 'Edit Idea'"
  [(visible)]="editDialogVisible"
  [modal]="true"
  [style]="{ width: '400px' }"
>
  <div class="flex flex-col gap-3">
    <div class="flex flex-col gap-1">
      <label for="title">Title</label>
      <input pInputText id="title" [(ngModel)]="editTitle" />
    </div>
    <div class="flex flex-col gap-1">
      <label for="description">Description</label>
      <textarea pTextarea id="description" [(ngModel)]="editDescription" rows="4"></textarea>
    </div>
  </div>
  <ng-template #footer>
    <p-button label="Cancel" severity="secondary" (click)="editDialogVisible = false" />
    <p-button label="Save" (click)="saveIdea()" />
  </ng-template>
</p-dialog>
