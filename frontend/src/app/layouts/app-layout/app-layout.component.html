<div class="min-h-screen w-full flex overflow-hidden antialiased text-gray-800 bg-white">

  <!-- section body side nav -->
  <nav aria-label="side bar" aria-orientation="vertical"
       class="flex-none flex flex-col items-center text-center bg-primary text-gray-600">
    <div class="h-16 flex items-center w-full">
      <img class="h-6 w-6 mx-auto"
           src="https://raw.githubusercontent.com/bluebrown/tailwind-zendesk-clone/master/public/assets/leaves.png"
           alt=""/>
    </div>

    <ul>
      @for (group of items; track group.id) {

        @if (group.label) {
          <!--          <li class="px-4 py-2 text-sm uppercase text-gray-950">-->
            <!--            {{ group.label }}-->
            <!--          </li>-->
        }

        @for (item of group.items ?? []; track item.id) {
          <li>
            <a
              [routerLink]="item.routerLink"
              routerLinkActive="bg-teal-700 text-white"
              [routerLinkActiveOptions]="{ exact: true }"
              class="h-16 px-6 flex items-center w-full hover:text-white"
            >
              <i [class]="item.icon + ' text-xl mx-auto'"></i>
            </a>
          </li>
        }

      }
    </ul>

    <div class="mt-auto flex flex-col items-center w-full space-y-2 mb-6 gap-4">
      <a class="hover:text-white" [routerLink]="['/', RouteTokens.APP, RouteTokens.SETTINGS]">
        <i [class]="PrimeIcons.COG + ' text-xl mx-auto'"></i>
      </a>
      <a class="hover:text-white" [routerLink]="['/']" (click)="logout()">
        <i [class]="PrimeIcons.SIGN_OUT + ' text-xl mx-auto'"></i>
      </a>
    </div>
  </nav>

  <div class="flex-1 flex flex-col">
    <router-outlet></router-outlet>
  </div>

</div>
