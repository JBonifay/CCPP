<nav aria-label="top bar" class="flex-none flex justify-between bg-linear-to-r from-primary to-primary-400 h-16">

  <!-- top bar left -->
  <ul aria-label="top bar left" aria-orientation="horizontal" class="flex items-center gap-3">
    <img class="h-16 mx-auto" [src]="workspaceConfigStore.config().logoUrl" alt="workspace logo"/>
    <span class="text-xl font-bold text-primary-950">{{ workspaceConfigStore.config().name }}</span>
  </ul>

  <!-- to bar right  -->
  <ul aria-label="top bar right" aria-orientation="horizontal" class="px-8 flex items-center gap-3">
    <li>
      <p-toggleButton
        class="h-8"
        [ngModel]="visitorMode.isActive()"
        (ngModelChange)="visitorMode.toggle()"
        onIcon="pi pi-eye-slash"
        offIcon="pi pi-eye"
        onLabel="Hidden"
        offLabel="Hide"
      />
    </li>

    <li>
      <p-avatar [label]="authStore.userName()?.slice(0, 2)" shape="circle"/>
    </li>
  </ul>
</nav>
